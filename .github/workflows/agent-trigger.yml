name: TouchFish Agent Trigger

on:
  push:
    branches-ignore:
      - master
      - main
  workflow_dispatch:
    inputs:
      agent_name:
        description: 'Agent to run (PO, DEV, TESTER)'
        required: true
        type: string

env:
  AGENT_IMAGE: ghcr.io/lightofthelight/touchfish-agent:latest

jobs:
  parse-trigger:
    runs-on: ubuntu-latest
    outputs:
      agent_name: ${{ steps.parse.outputs.agent_name }}
      should_run: ${{ steps.parse.outputs.should_run }}
    steps:
      - name: Parse commit message for agent
        id: parse
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "agent_name=${{ github.event.inputs.agent_name }}" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Chain trigger: ${{ github.event.inputs.agent_name }}"
          else
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            echo "Commit message: $COMMIT_MSG"

            if [[ "$COMMIT_MSG" =~ @(PO|DEV|TESTER) ]]; then
              AGENT_NAME="${BASH_REMATCH[1]}"
              echo "agent_name=$AGENT_NAME" >> $GITHUB_OUTPUT
              echo "should_run=true" >> $GITHUB_OUTPUT
              echo "Detected agent: $AGENT_NAME"
            elif [[ "$COMMIT_MSG" =~ \[(PO|DEV|TESTER)\] ]]; then
              AGENT_NAME="${BASH_REMATCH[1]}"
              echo "agent_name=$AGENT_NAME" >> $GITHUB_OUTPUT
              echo "should_run=true" >> $GITHUB_OUTPUT
              echo "Detected agent: $AGENT_NAME"
            else
              echo "should_run=false" >> $GITHUB_OUTPUT
              echo "No agent trigger found in commit message"
            fi
          fi

  run-agent:
    needs: parse-trigger
    if: needs.parse-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      temp_branch: ${{ steps.temp-branch.outputs.temp_branch }}
      has_changes: ${{ steps.push.outputs.has_changes }}
    env:
      AGENT_NAME: ${{ needs.parse-trigger.outputs.agent_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "TouchFish Agent"
          git config --global user.email "agent@touchfish.local"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup working branch
        id: temp-branch
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "temp_branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "Continuing on branch: ${{ github.ref_name }}"
          else
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            TEMP_BRANCH="agent/${{ env.AGENT_NAME }}/${TIMESTAMP}"
            git checkout -b "$TEMP_BRANCH"
            # Store origin branch so PR can target it later
            echo "${{ github.ref_name }}" > .agent-chain-origin
            git add .agent-chain-origin
            git commit -m "chore: record chain origin branch"
            echo "temp_branch=$TEMP_BRANCH" >> $GITHUB_OUTPUT
            echo "Created branch: $TEMP_BRANCH (origin: ${{ github.ref_name }})"
          fi

      - name: Get commit details
        id: commit
        run: |
          echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "message=Chain trigger: ${{ env.AGENT_NAME }}" >> $GITHUB_OUTPUT
          else
            echo "message<<EOF" >> $GITHUB_OUTPUT
            echo "${{ github.event.head_commit.message }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
          echo "branch=${{ steps.temp-branch.outputs.temp_branch }}" >> $GITHUB_OUTPUT

      - name: Pull Agent Docker Image
        run: |
          docker pull ${{ env.AGENT_IMAGE }}

      - name: Prepare agent home directory
        run: mkdir -p /tmp/agent-home

      - name: Run Agent Container
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -v /tmp/agent-home:/home/agent \
            -e HOME=/home/agent \
            -e AGENT_NAME="${{ env.AGENT_NAME }}" \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            -e CLAUDE_CODE_OAUTH_TOKEN="${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" \
            -e COMMIT_SHA="${{ steps.commit.outputs.sha }}" \
            -e COMMIT_MESSAGE="${{ steps.commit.outputs.message }}" \
            -e BRANCH_NAME="${{ steps.commit.outputs.branch }}" \
            -e REPO_NAME="${{ github.repository }}" \
            -w /workspace \
            ${{ env.AGENT_IMAGE }}

      - name: Push changes to temp branch
        id: push
        run: |
          # Stage and commit any remaining unstaged changes
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "Agent ${{ env.AGENT_NAME }} session completed

            Co-Authored-By: TouchFish Agent <agent@touchfish.local>"
          fi

          BRANCH="${{ steps.temp-branch.outputs.temp_branch }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if git log --oneline "origin/$BRANCH..HEAD" 2>/dev/null | grep -q .; then
              git push origin "$BRANCH"
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              echo "No changes to push"
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          else
            if git log --oneline "${{ github.ref_name }}..$BRANCH" | grep -q .; then
              git push origin "$BRANCH"
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              echo "No changes to push"
              echo "has_changes=false" >> $GITHUB_OUTPUT
            fi
          fi

  chain-or-pr:
    needs: [parse-trigger, run-agent]
    if: needs.parse-trigger.outputs.should_run == 'true' && needs.run-agent.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: write
    steps:
      - name: Checkout agent branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.run-agent.outputs.temp_branch }}

      - name: Determine next action
        id: next
        run: |
          AGENT="${{ needs.parse-trigger.outputs.agent_name }}"
          # Read the last commit message on the agent branch
          LAST_MSG=$(git log -1 --format="%s %b")
          echo "Agent: $AGENT"
          echo "Last commit: $LAST_MSG"

          if echo "$LAST_MSG" | grep -qE '@(PO|DEV|TESTER)'; then
            NEXT=$(echo "$LAST_MSG" | grep -oE '@(PO|DEV|TESTER)' | head -1 | tr -d '@')
            echo "action=chain" >> $GITHUB_OUTPUT
            echo "next_agent=$NEXT" >> $GITHUB_OUTPUT
            echo "Chaining to $NEXT"
          else
            echo "action=pr" >> $GITHUB_OUTPUT
            echo "No chain trigger found — creating PR"
          fi

      - name: Chain to next agent
        if: steps.next.outputs.action == 'chain'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT="${{ steps.next.outputs.next_agent }}"
          BRANCH="${{ needs.run-agent.outputs.temp_branch }}"
          gh workflow run agent-trigger.yml \
            --repo ${{ github.repository }} \
            --ref "$BRANCH" \
            -f agent_name="$NEXT"
          echo "Dispatched $NEXT agent on $BRANCH"

      - name: Create Pull Request
        if: steps.next.outputs.action == 'pr'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ORIGIN=$(cat .agent-chain-origin 2>/dev/null || echo "dev/initial-setup")
          BRANCH="${{ needs.run-agent.outputs.temp_branch }}"
          gh pr create \
            --title "[Agent Pipeline] $BRANCH" \
            --body "## Agent Pipeline Complete

          **Working Branch:** $BRANCH
          **Target Branch:** $ORIGIN
          **Pipeline:** PO → DEV → TESTER (approved)

          ---

          ### Changes
          Please review the changes in:
          - \`agents/PO/history.md\` for PO session details
          - \`agents/DEV/history.md\` for DEV session details
          - \`agents/TESTER/history.md\` for TESTER session details

          ---
          *Generated by TouchFish Agent System*" \
            --base "$ORIGIN" \
            --head "$BRANCH"
